name: release

# Tag a version (`git tag v0.1.4 && git push origin v0.1.4`) to build prebuilt
# `haven` binaries for macOS (arm64/x64) and Linux (arm64/x64, static musl),
# package each as a tarball + sha256 sidecar, publish the GitHub Release with
# RELEASE_NOTES.md, and push the generated Homebrew formula to
# nibbletech-labs/homebrew-tap. Tags with a pre-release suffix (e.g.
# v0.1.1-rc.1) publish as a GitHub pre-release and do not update the stable tap.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14 # Apple Silicon runner
          - target: x86_64-apple-darwin
            os: macos-14 # cross-compiled on Apple Silicon (Intel macos-13 runners are queue-starved)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm # native arm64 Linux runner (free for public repos)
            musl: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --bin haven --target ${{ matrix.target }}

      - name: Package tarball + sha256
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          NAME="haven-${VERSION}-${TARGET}"
          STAGE="$(mktemp -d)"
          cp "target/${TARGET}/release/haven" "$STAGE/haven"
          cp LICENSE README.md "$STAGE/" 2>/dev/null || true
          TAR="${NAME}.tar.gz"
          # COPYFILE_DISABLE keeps BSD tar from injecting ._ AppleDouble files.
          COPYFILE_DISABLE=1 tar -czf "$TAR" -C "$STAGE" .
          # "<hex>  <filename>" — shasum -c / sha256sum -c compatible.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$TAR" > "$TAR.sha256"
          else
            shasum -a 256 "$TAR" > "$TAR.sha256"
          fi
          cat "$TAR.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            haven-*.tar.gz
            haven-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/nibbletech-labs/haven/releases/download/${TAG}"
          sha() { awk '{print $1}' "dist/haven-${VERSION}-$1.tar.gz.sha256"; }
          cat > dist/haven.rb <<EOF
          # Homebrew formula for Haven — prebuilt binary, no Rust toolchain needed.
          # Copy into the tap repo (nibbletech-labs/homebrew-tap) as Formula/haven.rb.
          # Generated by .github/workflows/release.yml for ${TAG}.
          class Haven < Formula
            desc "Local-first work-graph store for humans and AI agents"
            homepage "https://github.com/nibbletech-labs/haven"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/haven-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "$(sha aarch64-apple-darwin)"
              end
              on_intel do
                url "${BASE}/haven-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "$(sha x86_64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/haven-${VERSION}-aarch64-unknown-linux-musl.tar.gz"
                sha256 "$(sha aarch64-unknown-linux-musl)"
              end
              on_intel do
                url "${BASE}/haven-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "$(sha x86_64-unknown-linux-musl)"
              end
            end

            def install
              bin.install "haven"
            end

            def caveats
              <<~CAVEAT
                Wire the MCP server + skills and create/select the default first project:
                  haven setup
                Then check the install:
                  haven item add "First item"
                  haven doctor
              CAVEAT
            end

            test do
              assert_match "haven", shell_output("#{bin}/haven --version")
            end
          end
          EOF
          echo "### Homebrew formula (\`${TAG}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo '```ruby' >> "$GITHUB_STEP_SUMMARY"
          cat dist/haven.rb >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Haven ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/haven-*.tar.gz
            dist/haven-*.tar.gz.sha256
            dist/haven.rb

      - name: Update Homebrew tap
        if: ${{ !contains(github.ref_name, '-') }}
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required to update nibbletech-labs/homebrew-tap."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/nibbletech-labs/homebrew-tap.git" tap
          cp dist/haven.rb tap/Formula/haven.rb
          cd tap
          git add Formula/haven.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date for ${GITHUB_REF_NAME}."
          else
            git commit -m "Update haven formula to ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi
